apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-k8s-logging
      variant: blue
  template:
    metadata:
      labels:
        app: hello-k8s-logging
        variant: blue
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: web-server
          image: hello-k8s-logging-web:latest
          imagePullPolicy: Never
          args: ["blue"]
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 1
            periodSeconds: 5
