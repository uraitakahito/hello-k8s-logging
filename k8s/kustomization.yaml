apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# 適用順は resources の記載順ではなく Kind ベースの組み込みソート順（legacy sort）で決まる
# https://kubectl.docs.kubernetes.io/references/kustomize/kustomization/sortoptions/
namespace: hello-k8s-logging
resources:
  - namespace.yaml
  - configmap.yaml
  - deployment-blue.yaml
  - deployment-green.yaml
  - service-blue.yaml
  - service-green.yaml
