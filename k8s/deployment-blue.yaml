apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-k8s-logging-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-k8s-logging
      variant: blue
  template:
    metadata:
      labels:
        app: hello-k8s-logging
        variant: blue
    spec:
      containers:
        - name: web-server
          image: hello-k8s-logging-web:latest
          imagePullPolicy: Never
          args: ["blue"]
          ports:
            - containerPort: 80
