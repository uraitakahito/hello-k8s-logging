server {
    listen 80;
    server_name _;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
    }

    # Liveness/Readiness Probe 専用エンドポイント
    # Probe は高頻度でリクエストを送るため、access_log を無効化し
    # Fluent Bit が収集するログにノイズが混入するのを防ぐ
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
