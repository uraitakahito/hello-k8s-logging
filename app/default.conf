server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
    }

    # Liveness/Readiness Probe 専用エンドポイント
    # Probe は高頻度でリクエストを送るため、access_log を無効化してログにノイズが混入するのを防ぐ
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
